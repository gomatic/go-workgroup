# Release configuration for workgroup — a Go library, not a binary.
# `goreleaser release` runs on a `v*` tag and publishes a GitHub release with a
# reproducible source archive, SHA-256 checksums, and a changelog. There are no
# cross-compiled binaries because nothing here has a `main` package.
version: 2

project_name: workgroup

before:
  hooks:
    - go mod tidy
    - go mod verify

# No binaries to build: this module exposes a library API only.
builds:
  - skip: true

source:
  enabled: true
  name_template: "{{ .ProjectName }}-{{ .Version }}-source"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

release:
  github:
    owner: gomatic
    name: workgroup
